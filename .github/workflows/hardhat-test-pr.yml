# Hardhat tests when opening/updating a PR into `main`.
# Use this when the Git repository root IS the `contracts/` Hardhat project.

name: Hardhat tests (contracts)

on:
  pull_request:
    branches: [main]
    paths:
      - "**"
      - ".github/workflows/hardhat-test-pr.yml"

permissions:
  contents: read

jobs:
  hardhat-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npx hardhat compile

      - name: Run tests
        run: npm test
