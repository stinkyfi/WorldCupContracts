# Slither static analysis — use this workflow when the Git repository root IS the
# `contracts/` Hardhat project (no parent `contracts/` folder in the repo).

name: Slither (contracts)

on:
  push:
    branches: [main]
    paths:
      - "**/*.sol"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/slither-contracts.yml"

permissions:
  contents: read

jobs:
  slither:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Compile Hardhat project
        run: npx hardhat compile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither
        run: pip install "slither-analyzer>=0.10.0"

      # Report is written to the Hardhat project root (here: repo root).
      - name: Run Slither
        run: slither . --hardhat-ignore-compile --json slither-report.json

      - name: Upload Slither report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: slither-report.json
          if-no-files-found: warn
